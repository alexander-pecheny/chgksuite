name: Build Standalone Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g., v0.26.1). Leave empty for build-only.'
        required: false
        default: ''

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
            rust_target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
          - os: macos-13
            platform: macos-x64
            rust_target: x86_64-apple-darwin
          - os: macos-latest
            platform: macos-arm64
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            platform: windows-x64
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout chgksuite
        uses: actions/checkout@v4

      - name: Checkout pyapp
        uses: actions/checkout@v4
        with:
          repository: ofek/pyapp
          path: pyapp
          ref: v0.29.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Create build directory
        shell: bash
        run: mkdir -p artifacts

      # Determine versions
      - name: Get versions
        id: versions
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          # Extract version from tag (remove 'v' prefix if present)
          if [[ "$TAG" =~ ^v ]]; then
            VERSION="${TAG:1}"
          else
            VERSION="$TAG"
          fi
          # Fallback to reading from version.py if no tag
          if [ -z "$VERSION" ] || [ "$VERSION" = "pyapp" ]; then
            VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' chgksuite/version.py || echo "0.0.0")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Determine if prerelease
          if [[ "$VERSION" =~ (a|b|rc)[0-9]+ ]]; then
            echo "prerelease=--prerelease=allow" >> $GITHUB_OUTPUT
          else
            echo "prerelease=" >> $GITHUB_OUTPUT
          fi

      # Build Qt GUI (skip on linux-arm64 - no PyQt6 wheel)
      - name: Build Qt GUI
        if: matrix.platform != 'linux-arm64'
        shell: bash
        working-directory: pyapp
        env:
          PYAPP_PROJECT_NAME: chgksuite-qt
          PYAPP_PROJECT_VERSION: ${{ steps.versions.outputs.version }}
          PYAPP_PROJECT_DEPENDENCY_FILE: ${{ github.workspace }}/requirements-qt.txt
          PYAPP_EXEC_SPEC: chgksuite_qt.__main__:main
          PYAPP_PYTHON_VERSION: "3.12"
          PYAPP_IS_GUI: "1"
          PYAPP_UV_ENABLED: "1"
        run: |
          # Create requirements file (no leading spaces)
          echo "chgksuite" > ${{ github.workspace }}/requirements-qt.txt
          echo "chgksuite-qt" >> ${{ github.workspace }}/requirements-qt.txt
          cat ${{ github.workspace }}/requirements-qt.txt

          cargo build --release --target ${{ matrix.rust_target }}

          # Copy binary with platform-specific naming
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.rust_target }}/release/pyapp.exe ../artifacts/chgkq-${{ matrix.platform }}.exe
          else
            cp target/${{ matrix.rust_target }}/release/pyapp ../artifacts/chgkq-${{ matrix.platform }}
          fi

      # Build Tk GUI
      - name: Build Tk GUI
        shell: bash
        working-directory: pyapp
        env:
          PYAPP_PROJECT_NAME: chgksuite-tk
          PYAPP_PROJECT_VERSION: ${{ steps.versions.outputs.version }}
          PYAPP_PROJECT_DEPENDENCY_FILE: ${{ github.workspace }}/requirements-tk.txt
          PYAPP_EXEC_SPEC: chgksuite_tk.__main__:main
          PYAPP_PYTHON_VERSION: "3.12"
          PYAPP_IS_GUI: "1"
          PYAPP_UV_ENABLED: "1"
        run: |
          # Create requirements file (no leading spaces)
          echo "chgksuite" > ${{ github.workspace }}/requirements-tk.txt
          echo "chgksuite-tk" >> ${{ github.workspace }}/requirements-tk.txt
          cat ${{ github.workspace }}/requirements-tk.txt

          cargo build --release --target ${{ matrix.rust_target }}

          # Copy binary with platform-specific naming
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.rust_target }}/release/pyapp.exe ../artifacts/chgkt-${{ matrix.platform }}.exe
          else
            cp target/${{ matrix.rust_target }}/release/pyapp ../artifacts/chgkt-${{ matrix.platform }}
          fi

      - name: List artifacts
        shell: bash
        run: ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: builds-${{ matrix.platform }}
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
